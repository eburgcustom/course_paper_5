name: CI/CD Pipeline

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_course
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Install dependencies
        run: |
          poetry install --no-root --no-interaction
          poetry run pip install flake8

      - name: Lint with flake8
        run: |
          poetry run flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          poetry run flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run Django tests
        env:
          SECRET_KEY: test-secret-key-for-ci
          DEBUG: False
          DATABASE_NAME: test_db
          DATABASE_USER: test_user
          DATABASE_PASSWORD: test_password
          DATABASE_HOST: localhost
          DATABASE_PORT: 5432
          EMAIL_HOST_USER: test@example.com
          EMAIL_HOST_PASSWORD: test_password
          DEFAULT_FROM_EMAIL: test@example.com
          SERVER_EMAIL: test@example.com
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
          STRIPE_PUBLISHABLE_KEY: pk_test_123
          STRIPE_SECRET_KEY: sk_test_123
        run: |
          poetry run python manage.py test

  docker-test:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and test with Docker Compose
        run: |
          cp .env_example .env
          echo "DATABASE_NAME=test_db" >> .env
          echo "DATABASE_USER=test_user" >> .env
          echo "DATABASE_PASSWORD=test_password" >> .env
          echo "DATABASE_HOST=localhost" >> .env
          echo "CELERY_BROKER_URL_DOCKER=redis://redis:6379/0" >> .env
          echo "CELERY_RESULT_BACKEND_DOCKER=redis://redis:6379/0" >> .env
          echo "SECRET_KEY=test-secret-key-for-ci" >> .env
          echo "DEBUG=True" >> .env
          echo "JWT_ACCESS_TOKEN_LIFETIME=15" >> .env
          echo "JWT_REFRESH_TOKEN_LIFETIME=1440" >> .env
          echo "CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000" >> .env
          
          docker compose -f docker-compose.yml up -d db redis
          sleep 10
          
          docker compose -f docker-compose.yml build web celery-beat
          docker compose -f docker-compose.yml run --rm web python manage.py migrate
          docker compose -f docker-compose.yml run --rm web python manage.py test
          
          docker compose -f docker-compose.yml down

  build:
    runs-on: ubuntu-latest
    needs: [test, docker-test]
    if: github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker images
        run: |
          docker compose build

      - name: Upload Docker images
        uses: actions/upload-artifact@v4
        with:
          name: docker-images
          path: |
            web.tar.gz
            celery-beat.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop'
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          script: |
            set -e  # Останавливать скрипт при любой ошибке
            cd course_paper_5

            git fetch origin develop
            git reset --hard origin/develop
            
            docker compose down
            docker compose up -d --build
            
            echo "Waiting for services..."
            for i in {1..60}; do
              if docker compose ps | grep -q "healthy\|Up"; then
                sleep 10
                break
              fi
              sleep 2
            done
            
            docker compose run --rm web python manage.py migrate
            
            docker compose exec -T web python manage.py collectstatic --noinput
            
            curl -f http://localhost:8000/admin/login/ || exit 1
            echo "✅ Deploy completed successfully"
